services:
  app:
    build: .
    container_name: reelclips_app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/reelclips_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: reelclips123
      SUPABASE_URL: ${SUPABASE_URL:-https://pxcpznttlogrsglezcbh.supabase.co}
      SUPABASE_KEY: ${SUPABASE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB4Y3B6bnR0bG9ncnNnbGV6Y2JoIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3ODgzNTI3NywiZXhwIjoyMDk0NDExMjc3fQ.nPV-c3WfboBYslV5Pr4o1qCBNKcDkfc2BSbRvekoQUY}
      SUPABASE_BUCKET_REELS: ${SUPABASE_BUCKET_REELS:-reels}
      SUPABASE_BUCKET_IMAGENES: ${SUPABASE_BUCKET_IMAGENES:-imagenes-perfil}
    ports:
      - "${APP_PORT:-8082}:8082"
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: reelclips_db
    environment:
      POSTGRES_DB: reelclips_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: reelclips123
    ports:
      - "5432:5432"
    volumes:
      - reelclips_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d reelclips_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  reelclips_data:
